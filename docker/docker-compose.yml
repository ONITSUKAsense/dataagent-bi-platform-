version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: dataagent-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: dataagent
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf
      - ../sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ../sql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - mysql-data:/var/lib/mysql
    networks:
      - dataagent-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dataagent-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - dataagent-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: dataagent-backend
    restart: always
    env_file:
      - ../.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      SPRING_PROFILES_ACTIVE: prod
      AI_SERVICE_URL: http://ai-service:8000
    volumes:
      - uploads-data:/app/uploads
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dataagent-net

  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: dataagent-ai
    restart: always
    env_file:
      - ../.env
    environment:
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      REDIS_HOST: redis
      MYSQL_HOST: mysql
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - dataagent-net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: dataagent-frontend
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - backend
      - ai-service
    networks:
      - dataagent-net

networks:
  dataagent-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  uploads-data:
