server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/dataagent?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true&useSSL=false
    username: root
    password: ${MYSQL_ROOT_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      database: 0
      timeout: 5000

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.dataagent.**.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

jwt:
  secret: ${JWT_SECRET:DataAgentSecretKey2024ForJWTTokenGenerationAndValidation}
  access-token-expire: ${JWT_ACCESS_TOKEN_EXPIRE:7200}
  refresh-token-expire: ${JWT_REFRESH_TOKEN_EXPIRE:604800}

ai:
  service:
    url: ${AI_SERVICE_URL:http://ai-service:8000}

file:
  upload-path: /app/uploads

logging:
  level:
    com.dataagent: INFO
    org.springframework: WARN
